<!DOCTYPE html>
<html lang="jp">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <input type="checkbox" id="extra" name="extra" checked />
  <label for="extra">EXゾーン</label>
</div>
<div style="display:inline">
  <input type="radio" id="master" name="rule" value="master" checked />
  <label for="master">マスター</label>
</div>
<div style="display:inline">
  <input type="radio" id="speed" name="rule" value="speed" />
  <label for="speed">スピード</label>
</div>
</div>
<div class="preview_pane">
<div class="field_container">
<div class="zone_container master"><div class="outline_vertical"></div></div>

<div class="status_label master"></div>
<div class="status_label"></div>
<div class="status_label"></div>
<div class="status_label"></div>
<div class="status_label master"></div>
<div class="zone_spacer"></div>
<div class="zone_container"><div class="outline_vertical"></div><div class="outline_horizontal"></div></div>
<div class="zone_spacer"></div>
<div class="zone_container"><div class="outline_vertical"></div><div class="outline_horizontal"></div></div>
<div></div>
<div class="status_label master"></div>
<div class="status_label"></div>
<div class="status_label"></div>
<div class="status_label"></div>

<div class="zone_container"><div class="outline_vertical"></div></div>
<div class="zone_container master"><div class="outline_vertical"></div></div>
</div>
</div>
<div class="output_button">
<div align="right"><button type="button">クリップボードに出力</button></div>
</div>
<div class="setting_pane">
<div class="tab_button" style="color:gray;">カード設定</div>
<div class="tab_button" style="color:gray;opacity:0.5;">イラスト枠設定</div>
<div class="tab_content">
<div style="grid-column: 1 / span 2;">
  <label for="name">カード名：</label>
  <input type="text" id="name" name="name" style="width:calc(100% - 8em);" />
</div>
<div style="grid-column: 1 / span 2;">カード種別：<select name="card" id="card-select">
  <option value="empty">-</option>
  <option value="facedown">裏側表示</option>
  <option value="normal">通常</option>
  <option value="effect">効果</option>
  <option value="ritual">儀式</option>
  <option value="fusion">融合</option>
  <option value="syncro">シンクロ</option>
  <option value="xyz">エクシーズ</option>
  <option value="link">リンク</option>
  <option value="magic">魔法</option>
  <option value="trap">罠</option>
</select>
<div style="display:inline">
  <input type="checkbox" id="pendulum" name="pendulum" />
  <label for="pendulum">ペンデュラム</label>
</div>
</div>
<div style="display:inline-block;">
<div class="status_input">
<div style="display:inline">
  <label for="atk">ATK/</label>
  <input type="text" inputmode="url" pattern="[0-9]*|[?∞]" placeholder="0" id="atk" name="atk" maxlength="6" size=5 />
</div>
<div style="display:inline">
  <label for="def">DEF/</label>
  <input type="text" inputmode="url" pattern="[0-9]*|[?∞]" placeholder="0" id="def" name="def" maxlength="6" size=5 />
</div>
</div>
<div>表示形式：
<div style="display:inline">
  <input type="radio" id="attack" name="position" value="attack" checked />
  <label for="attack">縦</label>
</div>
<div style="display:inline">
  <input type="radio" id="defense" name="position" value="defense" />
  <label for="defense">横</label>
</div>
</div>
<div>ｺﾝﾄﾛｰﾙ：
<div style="display:inline">
  <input type="radio" id="player" name="controller" value="player" checked />
  <label for="player">自分</label>
</div>
<div style="display:inline">
  <input type="radio" id="opponent" name="controller" value="opponent" />
  <label for="opponent">相手</label>
</div>
</div>
</div>
<div class="link-marker_grid">
  <label class="link-marker"><input type="checkbox" id="top-left">◤</label>
  <label class="link-marker" style="transform:rotate(45deg);"><input type="checkbox" id="top">◤</label>
  <label class="link-marker"><input type="checkbox" id="top-right">◥</label>
  <label class="link-marker" style="transform:rotate(45deg);"><input type="checkbox" id="left">◣</label>
  <label style="display:inline-block;"><input type="checkbox" id="link-marker"></label>
  <label class="link-marker" style="transform:rotate(45deg);"><input type="checkbox" id="right">◥</label>
  <label class="link-marker"><input type="checkbox" id="bottom-left">◣</label>
  <label class="link-marker" style="transform:rotate(45deg);"><input type="checkbox" id="bottom">◢</label>
  <label class="link-marker"><input type="checkbox" id="bottom-right">◢</label>
</div>
</div>
</div>
</body>
</html>
