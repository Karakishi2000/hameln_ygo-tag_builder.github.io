<div class="setting_pane">
<div style="height:1em;margin:5px 0;line-height:100%"><h4 style="color:gray;">ゾーン設定</h4></div>
ｶｰﾄﾞ種別：<select name="card" id="card-select">
  <option value="empty">-</option>
  <option value="facedown">裏側表示</option>
  <option value="normal">通常</option>
  <option value="effect">効果</option>
  <option value="ritual">儀式</option>
  <option value="fusion">融合</option>
  <option value="syncro">シンクロ</option>
  <option value="xyz">エクシーズ</option>
  <option value="link">リンク</option>
  <option value="magic">魔法</option>
  <option value="trap">罠</option>
</select>
<div style="display:inline">
  <input type="checkbox" id="pendulum" name="pendulum" />
  <label for="pendulum">ペンデュラム</label>
</div>
<div>
<div style="display:inline">
  <label for="name">ｶｰﾄﾞ名：</label>
  <input type="text" id="name" name="name" size="14" />
</div>
<div style="display:block;">
  <label for="name-color">文字色：</label>
  <input type="text" value="#000000" id="name-color" size="6" />
  <input type="color" value="#000000" id="name-color" />
</div>
</div>
<div>
<div style="display:inline">
  <label for="atk">ATK/</label>
  <input type="text" id="atk" name="atk" maxlength="6" size=5 />
</div>
<div style="display:inline">
  <label for="def">DEF/</label>
  <input type="text" id="def" name="def" maxlength="6" size=5 />
</div>
</div>
<div>表示形式：
<div style="display:inline">
  <input type="radio" id="attack" name="position" value="attack" checked />
  <label for="attack">縦</label>
</div>
<div style="display:inline">
  <input type="radio" id="defense" name="position" value="defense" />
  <label for="defense">横</label>
</div>
</div>
<div>ｺﾝﾄﾛｰﾙ：
<div style="display:inline">
  <input type="radio" id="player" name="controller" value="player" checked />
  <label for="player">自分</label>
</div>
<div style="display:inline">
  <input type="radio" id="opponent" name="controller" value="opponent" />
  <label for="opponent">相手</label>
</div>
</div>
