<!DOCTYPE html>
<html lang="jp" style="width:100%;height:100%">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>CSS test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="container" style="font-size:95%;">
<div class="preview_pane">
<div>
  <input type="checkbox" id="extra" name="extra" checked />
  <label for="extra">エクストラモンスターゾーン</label>
</div>
<div style="display:inline">
  <input type="radio" id="master" name="rule" value="master" checked />
  <label for="master">マスター</label>
</div>
<div style="display:inline">
  <input type="radio" id="speed" name="rule" value="speed" />
  <label for="speed">スピード</label>
</div>
<p></p>

<div style="display:block;"><div style="display:inline-block;height:0.5em;font-size:0.5em;margin:0;"></div></div>
<div class="zone_container"><div class="zone_default"></div><div class="zone_defense"></div></div><div class="zone_container"><div class="zone_default"></div><div class="zone_defense"></div></div><div class="zone_container"><div class="zone_default"></div><div class="zone_defense"></div></div><div class="zone_container"><div class="zone_default"></div><div class="zone_defense"></div></div><div class="zone_container"><div class="zone_default"></div><div class="zone_defense"></div></div>

<p></p>
<div align="right"><button type="button">クリップボードに出力</button></div>
</div>
<div class="setting_pane">
<div style="height:1em;margin:5px 0;line-height:100%"><h4 style="color:gray;">ゾーン設定</h4></div>
カード種別：<select name="card" id="card-select">
  <option value="empty">-使用していないゾーン-</option>
  <option value="facedown">裏側表示カード</option>
  <option value="normal">通常モンスター</option>
  <option value="effect">効果モンスター</option>
  <option value="ritual">儀式モンスター</option>
  <option value="fusion">融合モンスター</option>
  <option value="syncro">シンクロモンスター</option>
  <option value="xyz">エクシーズモンスター</option>
  <option value="link">リンクモンスター</option>
  <option value="magic">魔法カード</option>
  <option value="trap">罠カード</option>
</select>
<div>
  <input type="checkbox" id="pendulum" name="pendulum" />
  <label for="pendulum">ペンデュラム</label>
</div>
<div style="display:inline">
  <input type="radio" id="attack" name="position" value="attack" checked />
  <label for="attack">縦</label>
</div>
<div style="display:inline">
  <input type="radio" id="defense" name="position" value="defense" />
  <label for="defense">横</label>
</div>
<div>
  <label for="icon">アイコン文字:</label>
  <input type="text" id="icon" name="icon" maxlength="3" size=2 />
</div>
<div>
  <label for="color-picker">背景色:</label>
  <input type="color" value="#808080" id="color-picker" />
</div>
</div>

</html>
